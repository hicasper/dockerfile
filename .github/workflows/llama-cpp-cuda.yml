name: Build latest llama.cpp with CUDA docker image

on:
  workflow_dispatch:

env:
  platforms: linux/arm64
  image: ${{ secrets.DOCKERHUB_USERNAME }}/llama-cpp-cuda

jobs:
  build-and-publish:
    runs-on: ubuntu-22.04-arm
    steps:
      #- name: Free Disk Space (Ubuntu)
      #  uses: ggml-org/free-disk-space@v1.3.1
      #  with:
      #    # this might remove tools that are actually needed, if set to "true" but frees about 6 GB
      #    tool-cache: false
      #    # all of these default to true, but feel free to set to "false" if necessary for your workflow
      #    android: true
      #    dotnet: true
      #    haskell: true
      #    large-packages: true
      #    docker-images: true
      #    swap-storage: true

      - name: Get Release Info
        id: get-version
        run: |
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | jq -r '.tag_name')
          if [ -z "$LATEST_RELEASE" ] || [ "$LATEST_RELEASE" = "null" ]; then
            echo "Failed to fetch tag_name from GitHub API"
            exit 1
          fi
          echo "Latest llama.cpp release: $LATEST_RELEASE"
          echo "GITTAG=$LATEST_RELEASE" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: 'ggml-org/llama.cpp'
          ref: '${{ steps.get-version.outputs.GITTAG }}'

      - name: Replace Dockerfile
        run: |
          curl -fsSL -o .devops/cuda.Dockerfile https://github.com/hicasper/dockerfile/raw/refs/heads/master/llama-cpp-cuda/cuda.Dockerfile

      #- name: Set up QEMU
      #  uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push the latest version
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devops/cuda.Dockerfile
          target: server
          build-args: |
            BUILD_DATE=${{ steps.get-version.outputs.BUILD_DATE }}
            APP_VERSION=${{ steps.get-version.outputs.GITTAG }}
            APP_REVISION=${{ steps.checkout.outputs.commit }}

          platforms: ${{ env.platforms }}
          push: true
          tags: >-
            ${{ env.image }}:server-${{ steps.get-version.outputs.GITTAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max